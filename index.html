<!doctype html>
<!--suppress HtmlUnknownTarget -->
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link
            rel="icon"
            type="image/svg+xml"
            href="/favicon.svg"
        >
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html, body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
                /*background: #000;*/
            }
            canvas {
                display: block;
                width: min(100vw, 100vh);
                height: min(100vw, 100vh);
            }
            #controls {
                position: fixed;
                top: 10px;
                right: 10px;
                background: rgba(0,0,0,0.7);
                color: #fff;
                padding: 12px;
                border-radius: 8px;
                font-family: monospace;
                font-size: 12px;
                display: flex;
                flex-direction: column;
                gap: 8px;
                z-index: 10;
            }
            #controls label {
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 8px;
            }
            #controls input[type="range"] {
                width: 120px;
            }
            #controls input[type="number"] {
                width: 70px;
                background: rgba(255,255,255,0.1);
                border: 1px solid rgba(255,255,255,0.3);
                color: #fff;
                font-family: monospace;
                font-size: 12px;
                padding: 2px 4px;
                border-radius: 4px;
            }
            #controls button {
                background: rgba(255,255,255,0.15);
                border: 1px solid rgba(255,255,255,0.3);
                color: #fff;
                font-family: monospace;
                font-size: 12px;
                padding: 4px 8px;
                border-radius: 4px;
                cursor: pointer;
            }
            #controls button:hover {
                background: rgba(255,255,255,0.25);
            }
        </style>
        <title>Omega Fluids</title>
    </head>
    <body>
        <div id="controls">
            <label>
                Position: 
                <input type="number" id="val-position">
                <input
                    type="range"
                    id="position"
                    min="0.01"
                    max="0.49"
                    step="0.01"
                >
            </label>
            <label>
                Radius: 
                <input type="number" id="val-radius">
                <input
                    type="range"
                    id="radius"
                    min="0.01"
                    max="0.3"
                    step="0.01"
                >
            </label>
            <label>
                Strength: 
                <input type="number" id="val-strength">
                <input
                    type="range"
                    id="strength"
                    min="0.001"
                    max="0.2"
                    step="0.001"
                >
            </label>
            <button onclick="location.reload()">Reload</button>
        </div>
        <canvas id="GLCanvas">
            Your browser doesn't support WebGL
        </canvas>
        <script>
            const params = new URLSearchParams(window.location.search);
            const sliders = ['position', 'radius', 'strength'];
            const defaults = { position: '0.15', radius: '0.05', strength: '0.18' };

            function reload(name, val) {
                const p = new URLSearchParams(window.location.search);
                p.set(name, val);
                window.location.search = p.toString();
            }

            sliders.forEach(name => {
                const range = document.getElementById(name);
                const number = document.getElementById('val-' + name);
                const value = params.get(name) ?? defaults[name];

                range.value = value;
                number.value = value;
                number.min = range.min;
                number.max = range.max;
                number.step = range.step;

                range.addEventListener('change', () => {
                    number.value = range.value;
                    reload(name, range.value);
                });

                number.addEventListener('change', () => {
                    range.value = number.value;
                    reload(name, number.value);
                });
            });
        </script>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
